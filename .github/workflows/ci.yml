name: .NET CI Pipeline

on:
  push:
    branches: [ "main", "ai-version-1", "ai-version-2", "ai-version-3" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Test
        run: dotnet test --verbosity normal
